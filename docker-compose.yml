services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: socratot-app
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/socratot.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./evaluation:/app/evaluation
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
